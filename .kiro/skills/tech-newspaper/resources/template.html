<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f0e8;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #1a1a1a;
    padding: 60px;
    width: 960px;
  }

  .header {
    text-align: center;
    border-bottom: 3px double #1a1a1a;
    padding-bottom: 20px;
    margin-bottom: 40px;
  }

  .header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 16px;
    margin-bottom: 12px;
  }

  .header .meta {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: #666;
  }

  .section {
    margin-bottom: 36px;
    padding-bottom: 36px;
    border-bottom: 1px solid #ccc;
  }

  .section:last-of-type { border-bottom: none; }

  .section-tag {
    font-size: 13px;
    color: #888;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  .section-tag::before {
    content: attr(data-icon);
    margin-right: 6px;
  }

  .section h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 14px;
  }

  .section .body {
    font-size: 16px;
    line-height: 1.85;
    color: #333;
  }

  .section .body strong { color: #c0392b; }

  .editor-comment {
    margin-top: 16px;
    padding: 14px 18px;
    background: #faf6f0;
    border-left: 4px solid #c0392b;
    font-size: 14.5px;
    line-height: 1.75;
    color: #444;
  }

  .editor-comment::before {
    content: '▸ 编辑点评：';
    font-weight: 700;
    color: #c0392b;
  }

  /* 头版头条 */
  .headline {
    background: #fff;
    border: 2px solid #1a1a1a;
    padding: 32px 36px;
    margin-bottom: 40px;
  }

  .headline .badge {
    display: inline-block;
    background: #c0392b;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    padding: 4px 14px;
    letter-spacing: 4px;
    margin-bottom: 16px;
  }

  .headline h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 32px;
    font-weight: 900;
    margin-bottom: 16px;
    line-height: 1.35;
  }

  .headline .body { font-size: 17px; line-height: 1.85; }

  /* 编辑部短评 */
  .editorial {
    background: #fff;
    border: 1px solid #ddd;
    padding: 28px 32px;
    margin-top: 8px;
  }

  .editorial-title {
    font-size: 15px;
    color: #888;
    margin-bottom: 12px;
    letter-spacing: 2px;
  }

  .editorial-title::before { content: '📋 '; }

  .editorial .body {
    font-size: 15px;
    line-height: 1.85;
    color: #333;
  }

  .editorial .preview {
    margin-top: 14px;
    font-size: 13.5px;
    color: #999;
  }
</style>
</head>
<body>

<div class="header">
  <h1>{{TITLE}}</h1>
  <div class="meta">
    <span>{{DATE}} · {{DAY_OF_WEEK}} · 第{{ISSUE}}期</span>
    <span>主编：{{EDITOR}}</span>
  </div>
</div>

{{HEADLINE_SECTION}}

{{SECTIONS}}

{{EDITORIAL}}

</body>
</html>
